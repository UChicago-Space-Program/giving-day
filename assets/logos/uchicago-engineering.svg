<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gear shape built from a circle + teeth -->
    <clipPath id="gear-clip">
      <rect x="0" y="0" width="400" height="120"/>
    </clipPath>
  </defs>

  <!-- Gear -->
  <g transform="translate(60, 60)">
    <!-- Gear teeth (12 teeth) -->
    <g fill="#800000">
      <!-- Tooth 1 - 0° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(0)"/>
      <!-- Tooth 2 - 30° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(30)"/>
      <!-- Tooth 3 - 60° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(60)"/>
      <!-- Tooth 4 - 90° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(90)"/>
      <!-- Tooth 5 - 120° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(120)"/>
      <!-- Tooth 6 - 150° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(150)"/>
      <!-- Tooth 7 - 180° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(180)"/>
      <!-- Tooth 8 - 210° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(210)"/>
      <!-- Tooth 9 - 240° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(240)"/>
      <!-- Tooth 10 - 270° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(270)"/>
      <!-- Tooth 11 - 300° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(300)"/>
      <!-- Tooth 12 - 330° -->
      <rect x="-5" y="-50" width="10" height="14" rx="2" transform="rotate(330)"/>
    </g>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="40" fill="#800000"/>
    <!-- Axle hole -->
    <circle cx="0" cy="0" r="14" fill="#ffffff"/>
    <!-- Inner ring detail -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Text, vertically centered with gear -->
  <text x="88" y="50" font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif" font-size="38" font-weight="700" fill="#800000" letter-spacing="3" stroke="#ffffff" stroke-width="12" paint-order="stroke">UCHICAGO</text>
  <text x="88" y="80" font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif" font-size="28" font-weight="400" fill="#800000" letter-spacing="5" stroke="#ffffff" stroke-width="9" paint-order="stroke">ENGINEERING</text>
</svg>
